version: '3.8'

services:
  # Nginx — веб-сервер, принимает HTTP запросы и отдаёт их Laravel
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # Laravel — PHP приложение (бэкенд/API)
  app:
    build: ./backend
    volumes:
      - ./backend:/var/www
    environment:
      - DB_HOST=db
      - DB_DATABASE=yandex_reviews
      - DB_USERNAME=root
      - DB_PASSWORD=secret
      - PARSER_URL=http://parser:8001
    depends_on:
      - db

  # Vue 3 — фронтенд (SPA)
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost/api

  # MySQL — база данных
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: yandex_reviews
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  # Python Playwright — парсер Яндекс.Карт
  parser:
    build: ./parser
    ports:
      - "8001:8001"
    environment:
      - PYTHONUNBUFFERED=1

volumes:
  db_data:
